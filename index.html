<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九達BINGO</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background: #2c1a4d; color: white; margin: 0; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        
        /* 賓果盤 */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 500px; margin: 20px auto; }
        .cell { padding: 20px 5px; font-size: 22px; background: #1e3c72; color: white; border: 2px solid #2a5298; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .cell:disabled { background: #ffc107 !important; color: #333 !important; border: 2px solid #ff9800; cursor: not-allowed; text-decoration: line-through; }
        .cell:hover:not(:disabled) { background: #2a5298; }

        /* 進度條常駐改良 */
        .progress-container { width: 100%; max-width: 600px; background: #555; height: 35px; border-radius: 18px; margin: 20px auto; overflow: hidden; border: 2px solid #fff; box-shadow: 0 0 15px rgba(232, 27, 60, 0.3); }
        .progress-bar { height: 100%; background: #e21b3c; width: 0%; transition: width 1s linear; }
        .timer-text { font-size: 32px; font-weight: bold; color: #ffc107; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }

        .task-box { background: white; color: #333; padding: 25px; border-radius: 15px; max-width: 500px; margin: 20px auto; text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-role { display: inline-block; width: 140px; margin: 8px; padding: 12px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #26890c; color: white; font-weight: bold; }
        .btn-main { display: block; width: 80%; max-width: 300px; margin: 20px auto; padding: 20px; font-size: 22px; }
        
        #qrcode { background: white; padding: 15px; display: inline-block; border-radius: 10px; margin-top: 15px; }
        .input-box { padding: 12px; font-size: 18px; width: 250px; border-radius: 8px; border: none; text-align: center; margin-bottom: 15px; }
        
        .info-panel { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; max-width: 550px; margin: 10px auto; font-size: 16px; text-align: left; }
        .dashboard { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 14px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; text-align: left; }
        .dash-item { padding: 5px; border-bottom: 1px solid #443566; }
    </style>
</head>
<body>

    <!-- 1. 【首頁歡迎畫面】 -->
    <div id="screenWelcome" class="screen active">
        <h1>🏆九達 BINGO 🏆</h1>
        <p>請選擇您的身分開始遊戲：</p>
        <button class="btn-role btn-main" style="background:#864cbf;" onclick="onCreateGameClick()">➕ Create Game (當關主)</button>
        <button class="btn-role btn-main" style="background:#26890c;" onclick="showJoinScreen()">🚪 Join Game (玩家加入)</button>
    </div>

    <!-- 2. 【加入遊戲頁面】 -->
    <div id="screenJoinForm" class="screen">
        <h2>🚪 加入賓果房間</h2>
        <input type="number" id="inputRoomId" class="input-box" placeholder="請輸入 6 位數房號"><br>
        <input type="text" id="inputPlayerName" class="input-box" placeholder="請輸入您的名字 / 地區"><br>
        <button class="btn-role btn-main" style="background:#26890c; margin-top:10px;" onclick="submitJoinGame()">確認加入遊戲</button>
        <br>
        <button onclick="backToWelcome()" style="background:grey; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">返回首頁</button>
    </div>

    <!-- 3. 【遊戲主畫面】 -->
    <div id="screenGame" class="screen">
        <h2 id="identityTitle">我的身分</h2>
        
        <!-- 大螢幕投影與邀請資訊（關主看得到） -->
        <div class="info-panel" id="roomInfoPanel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div>
                    <h2 style="color: #ffc107; margin: 0 0 10px 0;">房間號碼：<span id="roomDisplay" style="font-size: 32px;">------</span></h2>
                    <strong>專屬邀請連結（手機掃碼加入）：</strong><br>
                    <span id="lobbyLink" style="color:#00e676; word-break: break-all; font-size: 14px;"></span>
                </div>
                <div id="qrcode"></div>
            </div>
        </div>

        <!-- 【核心進度條區】現在直接常駐在畫面最上方，方便隨時觀看 -->
        <div id="syncTimerArea" style="margin: 20px auto; max-width: 600px;">
            <div class="timer-text" id="timerText">🔒 遊戲尚未開始，請等待關主點擊下方按鈕解鎖...</div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <!-- 關主大按鈕與劃掉按鈕區 -->
            <div style="margin-top: 15px;">
                <button id="btnHostStart" class="btn-role" style="background:#864cbf; width:100%; max-width:400px; padding: 15px; font-size: 20px; display: none;" onclick="hostStartGame()">▶ 點此「啟動並開始遊戲」</button>
                <button id="btnVerifyDone" class="btn-role" style="background:#e21b3c; width:100%; max-width:400px; padding: 12px; font-size: 18px; display: none;" onclick="clickVerifyDone()">✓ 點此完成驗證（劃掉此號碼）</button>
            </div>
        </div>

        <!-- 任務框 -->
        <div id="taskDisplay" class="task-box" style="display: none;">
            <h3 style="margin-top:0; color:#46178f;" id="taskHeader">⚡ 專屬任務 ⚡</h3>
            <p id="taskContent" style="font-size: 20px; font-weight: bold; line-height: 1.5; color:#111;"></p>
        </div>

        <h3>【 中央賓果號碼盤 】</h3>
        <p id="gameHint" style="color:#ffc107; font-size:14px; margin:0;">⚠️ 號碼盤目前鎖定中，待關主啟動後即可自由點擊開題！</p>
        <div class="grid" id="bingoGrid"></div>

        <!-- 關主專用管理面板 -->
        <div id="hostControls" style="display: none; margin-top: 30px; border-top:1px solid #555; padding-top:20px;">
            <h3>📊 全局連線與進度狀態看板</h3>
            <div class="dashboard" id="connectedPlayersDashboard">暫無連線數據</div>
            <button onclick="resetGame()" style="background:#777; color:white; margin-top:35px; padding: 8px 15px; border:none; border-radius:4px; cursor:pointer;">重置整場遊戲</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myRole = null;
        let myRoomId = null;
        let myName = "";
        let isGameActivated = false; // 記錄本機上的號碼盤是否已解鎖

        // 自動讀取防黑屏斷線的快取紀錄
        window.onload = function() {
            const cachedRoom = localStorage.getItem('bingo_room');
            const cachedName = localStorage.getItem('bingo_name');
            const cachedRole = localStorage.getItem('bingo_role');
            
            if(cachedRoom && cachedName && cachedRole) {
                myRoomId = cachedRoom;
                myName = cachedName;
                myRole = cachedRole === 'host' ? 'host' : parseInt(cachedRole);
                
                if(myRole !== 'host') {
                    socket.emit('joinGame', { roomId: myRoomId, playerName: myName, savedRole: cachedRole });
                }
            }
        };

        // 初始化 1~25 賓果按鈕
        const grid = document.getElementById('bingoGrid');
        for (let i = 1; i <= 25; i++) {
            const btn = document.createElement('button');
            btn.className = 'cell';
            btn.id = `cell-${i}`;
            btn.innerText = i;
            btn.onclick = () => {
                if (!isGameActivated) {
                    alert("遊戲尚未由關主啟動，目前無法點選號碼！");
                    return;
                }
                socket.emit('selectNumber', { roomId: myRoomId, num: i });
            };
            grid.appendChild(btn);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const urlRoom = urlParams.get('room');
        if(urlRoom) {
            showJoinScreen();
            document.getElementById('inputRoomId').value = urlRoom;
        }

        function showJoinScreen() {
            document.getElementById('screenWelcome').classList.remove('active');
            document.getElementById('screenJoinForm').classList.add('active');
        }
        function backToWelcome() {
            document.getElementById('screenJoinForm').classList.remove('active');
            document.getElementById('screenWelcome').classList.add('active');
        }

        function onCreateGameClick() { socket.emit('createGame'); }

        socket.on('gameCreated', (roomId) => {
            myRoomId = roomId;
            myRole = 'host';
            localStorage.setItem('bingo_room', roomId);
            localStorage.setItem('bingo_role', 'host');
            
            initGameBoard();
            
            const inviteLink = `${window.location.origin}${window.location.pathname}?room=${roomId}`;
            document.getElementById('lobbyLink').innerText = inviteLink;
            document.getElementById('roomDisplay').innerText = roomId;
            
            document.getElementById('qrcode').innerHTML = ''; 
            new QRCode(document.getElementById('qrcode'), { text: inviteLink, width: 110, height: 110 });
        });

        function submitJoinGame() {
            const roomId = document.getElementById('inputRoomId').value;
            const name = document.getElementById('inputPlayerName').value.trim();
            if(!roomId || !name) { alert('請填寫完整房號與您的名字！'); return; }
            myRoomId = roomId;
            myName = name;
            socket.emit('joinGame', { roomId: roomId, playerName: name });
        }

        socket.on('joinedSuccess', ({ roomId, role, playerName, state }) => {
            myRole = role;
            myName = playerName;
            localStorage.setItem('bingo_room', roomId);
            localStorage.setItem('bingo_name', playerName);
            localStorage.setItem('bingo_role', role);
            
            document.getElementById('screenJoinForm').classList.remove('active');
            initGameBoard();
            syncBoardState(state);
        });

        socket.on('errorMsg', (msg) => { alert(msg); });

        function initGameBoard() {
            document.getElementById('screenWelcome').classList.remove('active');
            document.getElementById('screenGame').classList.add('active');
            
            if (myRole === 'host') {
                document.getElementById('identityTitle').innerText = "👑 九達道場 - 賓果全局大螢幕";
                document.getElementById('roomInfoPanel').style.display = 'block';
                document.getElementById('hostControls').style.display = 'block';
                document.getElementById('btnHostStart').style.display = 'inline-block'; // 顯示啟動遊戲大按鈕
            } else {
                document.getElementById('identityTitle').innerText = `📱 ${myName} (代表點 ${myRole})`;
                document.getElementById('roomInfoPanel').style.display = 'none';
                document.getElementById('hostControls').style.display = 'none';
                document.getElementById('btnHostStart').style.display = 'none';
            }
        }

        // 關主點擊啟動
        function hostStartGame() {
            socket.emit('hostStartGame', myRoomId);
        }

        // 收到遊戲正式啟動訊號
        socket.on('gameStartedSignal', (state) => {
            isGameActivated = true;
            document.getElementById('btnHostStart').style.display = 'none'; // 隱藏啟動鈕
            document.getElementById('gameHint').innerText = "🟢 遊戲已啟動！任何人點選號碼盤數字即可直接開題。";
            document.getElementById('timerText').innerText = "等待小隊長或各點點擊數字開題...";
            syncBoardState(state);
        });

        socket.on('playerListUpdate', (players) => {
            if (myRole === 'host') {
                const dashboard = document.getElementById('connectedPlayersDashboard');
                let html = '';
                for (let i = 1; i <= 24; i++) {
                    const pName = players[i] ? `<span style="color:#00e676;font-weight:bold;">● 已連線 (${players[i]})</span>` : `<span style="color:#aaa;">○ 離線 / 待分配</span>`;
                    html += `<div class="dash-item"><strong>點 ${i} 位置：</strong> ${pName}</div>`;
                }
                dashboard.innerHTML = html;
            }
        });

        socket.on('syncState', (state) => { syncBoardState(state); });

        function syncBoardState(state) {
            updateGrid(state.usedNumbers);
            
            // 同步關主端與玩家端的啟用狀態
            if (state.gameStarted) {
                isGameActivated = true;
                document.getElementById('btnHostStart').style.display = 'none';
                document.getElementById('gameHint').innerText = "🟢 遊戲已啟動！任何人點選號碼盤數字即可直接開題。";
            }

            if (!state.isCounting) {
                document.getElementById('btnVerifyDone').style.display = 'none';
                document.getElementById('taskDisplay').style.display = 'none';
                document.getElementById('progressBar').style.width = '0%';
                if (isGameActivated) {
                    document.getElementById('timerText').innerText = "等待小隊長或各點點擊數字開題...";
                }
            }
        }

        // 開題訊號
        socket.on('startQuestion', ({ number, tasks, state }) => {
            updateGrid(state.usedNumbers);
            document.getElementById('btnVerifyDone').style.display = 'inline-block'; // 跳出完成驗證紐
            document.getElementById('timerText').innerText = `🎯 正在進行第 ${number} 號題目倒數！`;
            document.getElementById('taskDisplay').style.display = 'block';
            
            if (myRole === 'host') {
                document.getElementById('taskHeader').innerText = `📋 大螢幕提示：當前為第 ${number} 號任務`;
                document.getElementById('taskContent').innerHTML = `請各點就位。助理群請準備進行現場或線上驗證。`;
            } else {
                document.getElementById('taskHeader').innerText = `⚡ 點 ${myRole} 的專屬任務 ⚡`;
                document.getElementById('taskContent').innerText = tasks[myRole] || "此輪您無特別任務。";
            }
        });

        socket.on('timerUpdate', (seconds) => {
            document.getElementById('timerText').innerText = `⏳ 剩餘時間：${seconds} 秒`;
            const percent = (seconds / 120) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
            if (seconds <= 15) document.getElementById('progressBar').style.background = '#f29f05';
            else document.getElementById('progressBar').style.background = '#e21b3c';
        });

        socket.on('timeUp', () => {
            document.getElementById('timerText').innerText = `⏰ 時間到！請停止動作，等待助理驗證！`;
            document.getElementById('progressBar').style.width = '0%';
        });

        function clickVerifyDone() { socket.emit('verifyDone', myRoomId); }
        function resetGame() { 
            if(confirm('警告：這將會清空所有使用的號碼與玩家連線紀錄，確定重置？')) {
                localStorage.clear();
                socket.emit('hostReset', myRoomId); 
            }
        }

        function updateGrid(usedNumbers) {
            for (let i = 1; i <= 25; i++) {
                const btn = document.getElementById(`cell-${i}`);
                btn.disabled = usedNumbers.includes(i);
            }
        }
    </script>
</body>
</html>
